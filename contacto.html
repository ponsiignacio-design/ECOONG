<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto | EcoHuellas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head> <body>
    <header>
        <h1>EcoHuellas</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="programas.html">Programas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Contactanos</h2>
        <p>escribinos a nuestro mail o seguinos en redes</p>
        
        <a href="#"><i class="fa fa-phone"></i> 1165432387</a><br>
        <a href="#"><i class="fa fa-envelope"></i> ecohuella@mail.com</a>
    </main>

    <section>
        <h3>Colaborá con nosotros</h3>
        <p>Estamos siempre buscando colaboradores para nuestros proyectos. <strong>¡Únete a nuestro equipo!</p>
            
            <form action="/enviar" method="post">
                
                <label for="nombre">Nombre:</label><br>
                <input type="text" id="nombre" name="nombre" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="programa">Programa de interés:</label><br>
                <select id="programa" name="programa" required>
                    <option value="">Selecciona un programa</option>
                    <option value="pulmones-escolares">Pulmones Escolares</option>
                    <option value="guardianes-del-rio">Guardianes del Río</option>
                    <option value="taller-de-compostaje">Taller de Compostaje</option>
                </select><br><br>

                <label for="mensaje">Mensaje:</label><br>
                <textarea id="mensaje" name="mensaje" rows="4" required></textarea><br><br>

                <button type="submit">Enviar</button>

            </form>
    </section>
</body>
</html>
