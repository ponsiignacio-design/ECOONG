<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos — Patitas Felices</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Patitas Felices</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="turnos.html">Turnos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Solicitá tu turno</h2>
        <p>Completá el formulario y te confirmamos disponibilidad
            en menos de 24 horas.</p>
        <form action="#" method="post">
            <label for="nombre">Nombre y apellido</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Ana García" required>
            <label for="mascota">Nombre de la mascota</label>
            <input type="text" id="mascota" name="mascota" placeholder="Ej: Firulais" required>
            <label for="especie">Especie</label>
            <select id="especie" name="especie" required>
                <option value="">Seleccioná...</option>
                <option value="perro">Perro</option>
                <option value="gato">Gato</option>
                <option value="otro">Otro</option>
            </select>
            <label for="servicio">Servicio requerido</label>
            <select id="servicio" name="servicio" required>
                <option value="">Seleccioná...</option>
                <option value="consulta">Consulta general</option>
                <option value="peluqueria">Peluquería</option>
                <option value="cirugia">Cirugía</option>
            </select>
            <label for="fecha">Fecha preferida</label>
            <input type="date" id="fecha" name="fecha" required>
            <label for="observaciones">Observaciones</label>
            <textarea id="observaciones" name="observaciones" rows="4"
                placeholder="Contanos algo sobre la mascota o el motivo...">
</textarea>
            <button type="submit">Solicitar turno</button>
        </form>
    </main>
    <footer>
        <p><small>Patitas Felices &copy; 2026</small></p>
    </footer>
</body>

</html>
